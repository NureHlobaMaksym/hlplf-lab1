{% extends "base.html" %}

{% block title %}Видалити статтю{% endblock %}

{% block content %}
  <div class="max-w-2xl rounded-lg border border-red-500/40 bg-slate-900/60 p-6">
    <h1 class="text-2xl font-semibold text-red-200">Видалити статтю</h1>
    <p class="mt-3 text-slate-300">
      Ви впевнені, що хочете видалити «{{ object.title }}»? Цю дію неможливо скасувати.
    </p>
    <form method="post" class="mt-6 flex gap-3">
      {% csrf_token %}
      <button class="rounded bg-red-500/90 px-4 py-2 text-sm font-semibold text-white hover:bg-red-500">
        Видалити
      </button>
      <a class="rounded border border-slate-700 px-4 py-2 text-sm hover:border-slate-500" href="{% url 'article_detail' object.pk %}">
        Скасувати
      </a>
    </form>
  </div>
{% endblock %}
