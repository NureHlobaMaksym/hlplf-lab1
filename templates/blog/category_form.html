{% extends "base.html" %}

{% block title %}Категорія{% endblock %}

{% block content %}
  <div class="flex justify-center">
  <div class="w-full max-w-2xl rounded-lg border p-6" style="border-color: var(--border); background: var(--surface); box-shadow: var(--shadow);">
    <h1 class="text-2xl font-semibold">Категорія</h1>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>
        <label class="text-sm" style="color: var(--muted);">Назва</label>
        {{ form.name }}
      </div>
      <div class="flex gap-3">
        <button class="btn btn-primary" type="submit">
          Зберегти
        </button>
        <a class="btn" href="{% url 'category_list' %}">
          Скасувати
        </a>
      </div>
    </form>
  </div>
  </div>
{% endblock %}
