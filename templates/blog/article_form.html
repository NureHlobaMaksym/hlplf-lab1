{% extends "base.html" %}

{% block title %}Редактор статті{% endblock %}

{% block content %}
  <div class="flex justify-center">
  <div class="w-full max-w-3xl rounded-lg border p-6" style="border-color: var(--border); background: var(--surface); box-shadow: var(--shadow);">
    <h1 class="text-2xl font-semibold">Редактор статті</h1>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>
        <label class="text-sm" style="color: var(--muted);">Категорія</label>
        {{ form.category }}
      </div>
      <div>
        <label class="text-sm" style="color: var(--muted);">Заголовок</label>
        {{ form.title }}
      </div>
      <div>
        <label class="text-sm" style="color: var(--muted);">Текст</label>
        {{ form.body }}
      </div>
      <div class="flex gap-3">
        <button class="btn btn-primary" type="submit">
          Зберегти
        </button>
        <a class="btn" href="{% url 'article_list' %}">
          Скасувати
        </a>
      </div>
    </form>
  </div>
  </div>
{% endblock %}
